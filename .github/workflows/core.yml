name: Build Core
on:
  workflow_dispatch:

jobs:
  libcore:
    name: Native Build (LibCore)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Golang Status
        run: find buildScript libcore/*.sh | sort | xargs cat | sha1sum > golang_status

      - name: Libcore Status
        run: git ls-files libcore | xargs cat | sha1sum > libcore_status

      - name: LibCore Cache
        id: cache
        uses: actions/cache@v4
        with:
          path: app/libs/libcore.aar
          key: ${{ hashFiles('.github/workflows/*', 'golang_status', 'libcore_status') }}

      - name: Install Golang
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ^1.25

      - name: Native Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: ./run lib core

      - name: Upload libcore.aar to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: libcore-latest
          name: LibCore Latest
          files: app/libs/libcore.aar
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ github.token }}
